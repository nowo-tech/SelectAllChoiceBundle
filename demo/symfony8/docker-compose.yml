name: select-all-choice-bundle-demo-symfony-8
services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: select-all-choice-demo-symfony8-php
    working_dir: /app
    restart: unless-stopped
    volumes:
      - .:/app
      - ../..:/var/select-all-choice-bundle
      - ./docker/frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro
      - ./docker/php-dev.ini:/usr/local/etc/php/conf.d/99-dev.ini:ro
      - composer-cache:/root/.composer/cache
    environment:
      - COMPOSER_ALLOW_SUPERUSER=1
      - APP_ENV=dev
      - APP_DEBUG=1
      - APP_SECRET=change-me
      - PORT=8008
    # Mitigate Docker/WSL DNS failures resolving repo.packagist.org (composer curl error 6).
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "${PORT:-8008}:80"
    networks:
      - select-all-choice-demo-network

volumes:
  composer-cache:
    driver: local

networks:
  select-all-choice-demo-network:
    driver: bridge
