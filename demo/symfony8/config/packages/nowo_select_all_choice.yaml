nowo_select_all_choice:
  # Default form theme to use for the "Select all" toggle
  form_theme: 'bootstrap_5_layout.html.twig'
  # Default translation key for the "Select all" label when not overridden per field
  default_label: 'form.select_all'
  # Default position of the toggle: "before" or "after" the choices
  default_position: 'before'
  # Default CSS class for the "Select all" checkbox/input
  default_toggle_css_class: 'form-check-input'
  # Default CSS class for the wrapper div (toggle checkbox + label, e.g. form-check for Bootstrap)
  default_wrapper_css_class: 'form-check'
  # Default CSS class for the "Select all" label (e.g. form-check-label for Bootstrap)
  default_label_css_class: 'form-check-label'
  # Default CSS class for the outer wrapper div (toggle + choices)
  default_container_css_class: 'form-check mb-2'
  # Default translation domain for the "Select all" label
  translation_domain: 'NowoSelectAllChoiceBundle'
  # Debug mode: true/false; when true, the bundle will log debug messages to the console
  debug: true
